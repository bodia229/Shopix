<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Адмін — Shopix{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css?v=1"/>
  <link rel="stylesheet" href="/static/css/admin.css?v=1"/>
</head>
<body>

<div class="admin-wrap">

  <!-- SIDEBAR -->
  <aside class="admin-sidebar">
    <div class="admin-logo">
      Shop<span>ix</span>
      <small>Адмін панель</small>
    </div>
    <div class="sidebar-section">Головна</div>
    <a href="/admin" class="{% if active=='dash' %}active{% endif %}">📊 Дашборд</a>

    <div class="sidebar-section">Магазин</div>
    <a href="/admin/products" class="{% if active=='products' %}active{% endif %}">📦 Товари</a>
    <a href="/admin/categories" class="{% if active=='categories' %}active{% endif %}">🏷️ Категорії</a>
    <a href="/admin/orders" class="{% if active=='orders' %}active{% endif %}">🛒 Замовлення</a>

    <div class="sidebar-section">Користувачі</div>
    <a href="/admin/users" class="{% if active=='users' %}active{% endif %}">👥 Користувачі</a>

    <div class="sidebar-spacer"></div>
    <div class="sidebar-user">
      {{ user.name }}<br/>
      <a href="/" style="color:var(--accent2);font-size:.75rem;">← Сайт</a> ·
      <a href="/logout" style="color:var(--red);font-size:.75rem;">Вийти</a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">
    <div class="admin-topbar">
      <h1>{% block page_title %}{% endblock %}</h1>
      <div>{% block topbar_right %}{% endblock %}</div>
    </div>
    <div class="admin-content">
      {% block content %}{% endblock %}
    </div>
  </main>

</div>

{% block scripts %}{% endblock %}
</body>
</html>
